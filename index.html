<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>福岡 5 天直飛 彈性票價監控儀表板</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Noto+Sans+TC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="glow-bg"></div>
    <div class="app-container">
        <header class="app-header">
            <div class="brand">
                <i class="fa-solid fa-plane-departure brand-icon"></i>
                <div class="brand-text">
                    <h1>FUK Flight Tracker</h1>
                    <span class="sub-brand">福岡 5 天直飛雲端追蹤</span>
                </div>
            </div>

            <div class="route-details">
                <div class="route-badge">TPE ⇄ FUK</div>
                <div class="route-info">
                    <div class="info-item">
                        <i class="fa-solid fa-calendar-days"></i>
                        <span>追蹤區間：<b>未來 6 週 (彈性週四出發，週一回來)</b></span>
                    </div>
                    <div class="info-item">
                        <i class="fa-solid fa-plane"></i>
                        <span>條件過濾：<b>直飛航班 (不限航空公司)</b></span>
                    </div>
                </div>
            </div>

            <div class="sync-status">
                <div class="status-indicator">
                    <span class="pulse-dot"></span>
                    <span class="status-text">雲端監控中</span>
                </div>
                <div class="last-updated">
                    最後更新：<span id="update-time">讀取中...</span>
                </div>
            </div>
            
            <div class="nav-menu">
                <button class="nav-btn active" onclick="switchTab('dashboard')">
                    <i class="fa-solid fa-chart-line"></i> 票價儀表板
                </button>
                <button class="nav-btn" onclick="switchTab('setup')">
                    <i class="fa-solid fa-circle-info"></i> 雲端部署指南
                </button>
            </div>
        </header>

        <main class="main-content">
            <div id="tab-dashboard" class="tab-pane active">
                <div class="metrics-grid">
                    <!-- 最划算票價 -->
                    <div class="metric-card glass glow-primary">
                        <div class="card-header">
                            <span class="card-title">最便宜直飛總價</span>
                            <i class="fa-solid fa-fire card-icon text-primary"></i>
                        </div>
                        <div class="card-value" id="current-price">TWD --</div>
                        <div class="card-footer">
                            <span id="price-change-badge" class="badge success">最佳日期</span>
                            <span class="footer-text" id="best-date-text">讀取中...</span>
                        </div>
                    </div>

                    <!-- 行情平均票價 -->
                    <div class="metric-card glass">
                        <div class="card-header">
                            <span class="card-title">6週直飛平均票價</span>
                            <i class="fa-solid fa-calculator card-icon"></i>
                        </div>
                        <div class="card-value" id="lowest-price">TWD --</div>
                        <div class="card-footer">
                            <i class="fa-solid fa-circle-info footer-icon"></i>
                            <span class="footer-text">以此作為划算評估依據</span>
                        </div>
                    </div>

                    <!-- 購票評估 -->
                    <div class="metric-card glass">
                        <div class="card-header">
                            <span class="card-title">省錢幅度評估</span>
                            <i class="fa-solid fa-circle-dollar-to-slot card-icon text-success"></i>
                        </div>
                        <div class="card-value text-success" id="advice-status">評估中...</div>
                        <div class="card-footer">
                            <i class="fa-solid fa-circle-check footer-icon"></i>
                            <span class="footer-text" id="advice-details">比平均票價划算即推薦</span>
                        </div>
                    </div>
                </div>

                <!-- 6週區間柱狀圖 -->
                <div class="chart-card glass">
                    <div class="chart-header">
                        <h2><i class="fa-solid fa-chart-bar text-primary"></i> 未來 6 週出發票價對比 (週四~週一)</h2>
                        <div class="chart-legend">
                            <span class="legend-item"><span class="legend-dot bg-primary"></span>來回直飛票價</span>
                        </div>
                    </div>
                    <div class="chart-container">
                        <canvas id="priceChart"></canvas>
                    </div>
                </div>

                <!-- 各週列表 -->
                <div class="table-card glass">
                    <h2><i class="fa-solid fa-list-ul text-primary"></i> 未來 6 週直飛來回選項清單</h2>
                    <div class="table-responsive">
                        <table>
                            <thead>
                                <tr>
                                    <th>序號</th>
                                    <th>去回程日期區間</th>
                                    <th>行程天數</th>
                                    <th>航班屬性</th>
                                    <th>來回總價</th>
                                    <th>動作</th>
                                </tr>
                            </thead>
                            <tbody id="flight-options-body">
                                <tr>
                                    <td colspan="6" class="text-center">讀取雲端票價中...</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

            <!-- Tab: Setup (無更動) -->
            <div id="tab-setup" class="tab-pane">
                <!-- 指南面板 (與先前完全一致，不贅述) -->
            </div>
        </main>
    </div>
    <script src="app.js"></script>
</body>
</html>
